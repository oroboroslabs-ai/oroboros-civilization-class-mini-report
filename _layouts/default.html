<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title | default: site.title }}</title>
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
            line-height: 1.6;
            color: #e0e0e0;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: rgba(30, 30, 50, 0.9);
            border: 1px solid rgba(127, 127, 255, 0.3);
            border-radius: 10px;
            padding: 40px;
        }
        h1 {
            color: #7777ff;
            text-shadow: 0 0 10px rgba(127, 127, 255, 0.5);
            border-bottom: 1px solid rgba(127, 127, 255, 0.3);
            padding-bottom: 15px;
        }
        h2 {
            color: #ff77ff;
            margin-top: 30px;
        }
        h3 {
            color: #7fff7f;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin: 15px 0;
        }
        th, td {
            border: 1px solid rgba(127, 127, 255, 0.3);
            padding: 10px;
            text-align: left;
        }
        th {
            background: rgba(127, 127, 255, 0.2);
        }
        tr:nth-child(even) {
            background: rgba(0, 0, 0, 0.2);
        }
        code {
            background: rgba(127, 127, 255, 0.1);
            padding: 2px 6px;
            border-radius: 3px;
        }
        hr {
            border: none;
            border-top: 1px solid rgba(127, 127, 255, 0.3);
            margin: 30px 0;
        }
        .status-ok {
            color: #7fff7f;
        }
        .status-warning {
            color: #ffff7f;
        }
        .status-critical {
            color: #ff7f7f;
        }
    </style>
</head>
<body>
    <div class="container">
        {{ content }}
    </div>
</body>
</html>
